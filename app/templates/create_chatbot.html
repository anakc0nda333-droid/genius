<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Buat Chatbot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <form action="/auth/create-chatbot" method="POST"
        class="bg-white p-8 rounded-xl shadow w-96">

    <h2 class="text-xl font-semibold mb-6">Buat Chatbot</h2>

    <input type="text" name="nama_chatbot"
      placeholder="Nama Chatbot"
      class="w-full mb-4 px-4 py-2 border rounded-lg"
      required>

    <button class="w-full bg-blue-500 text-white py-2 rounded-lg">
      Lanjut
    </button>

  </form>

</body>
</html>
