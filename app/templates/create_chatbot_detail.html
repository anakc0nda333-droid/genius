<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Detail Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <div class="max-w-2xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">
      <h2 class="text-lg font-semibold mb-4">Detail Usaha</h2>

      <form method="POST" enctype="multipart/form-data">
        <input
          type="text"
          name="nama_usaha"
          placeholder="Nama Usaha"
          class="w-full mb-3 px-4 py-2 border rounded-lg"
        />

        <input
          type="text"
          name="deskripsi_usaha"
          placeholder="Deskripsi"
          class="w-full mb-3 px-4 py-2 border rounded-lg"
        />

        <input
          type="text"
          name="alur_usaha"
          placeholder="Alur Usaha"
          class="w-full mb-3 px-4 py-2 border rounded-lg"
        />

        <input
          type="text"
          name="tujuan_chatbot"
          placeholder="Tujuan Chatbot"
          class="w-full mb-3 px-4 py-2 border rounded-lg"
        />

        <textarea
          name="batasan_behavior"
          placeholder="Aturan Chatbot"
          class="w-full mb-4 px-4 py-2 border rounded-lg"
        ></textarea>

        <label class="text-sm">Tentang Perusahaan</label>
        <input
          type="file"
          name="file_knowledge"
          class="w-full border rounded-lg p-2"
        />

        <button class="w-full bg-green-500 text-white py-2 rounded-lg">
          Simpan
        </button>
      </form>
    </div>
  </body>
</html>
