<!doctype html>
<html>
  <head>
    <title>Register</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 320px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
      h2 {
        text-align: center;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #4facfe;
        border: none;
        color: white;
        border-radius: 8px;
        cursor: pointer;
      }
      .switch {
        text-align: center;
        margin-top: 10px;
        color: #007bff;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Register</h2>

      <form action="/auth/register" method="POST">
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Register</button>
      </form>

      <div class="switch">
        Sudah punya akun? <a href="/auth/login">Login</a>
      </div>
    </div>
  </body>
</html>
